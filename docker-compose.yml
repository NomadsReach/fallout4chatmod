services:
  chat-server:
    build: ./server
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      - PORT=3000
      - MAX_HISTORY=50
      - BOT_SECRET=${BOT_SECRET}
      - BANS_FILE=/app/data/bans.json
      - BLOCKED_NAMES_FILE=/app/data/blocked_names.json
      - ADMIN_USER_IDS=${ADMIN_USER_IDS}
    volumes:
      - ./data:/app/data

  discord-bot:
    build: ./discord-bot
    restart: unless-stopped
    depends_on:
      - chat-server
    environment:
      - DISCORD_TOKEN=${DISCORD_TOKEN}
      - DISCORD_CHANNEL_ID=${DISCORD_CHANNEL_ID}
      - WS_URL=ws://chat-server:3000
      - BOT_SECRET=${BOT_SECRET}
      - ADMIN_IDS=${ADMIN_IDS}
      - ADMIN_ROLE_ID=${ADMIN_ROLE_ID}
